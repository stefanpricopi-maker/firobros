[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/gallery"
  to = "/portofoliu/"
  status = 301

[[redirects]]
  from = "/gallery/"
  to = "/portofoliu/"
  status = 301

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
